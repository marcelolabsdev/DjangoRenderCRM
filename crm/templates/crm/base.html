<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CRM{% endblock %} | CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <span class="sidebar-brand-icon"><i class="bi bi-bar-chart-fill"></i></span>
                    <span class="sidebar-brand-text">CRM</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="{% url 'dashboard' %}" class="sidebar-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                    <i class="bi bi-grid-1x2"></i> Dashboard
                </a>
                <a href="{% url 'contacto_list' %}" class="sidebar-link {% if 'contacto' in request.resolver_match.url_name %}active{% endif %}">
                    <i class="bi bi-person"></i> Contactos
                </a>
                <a href="{% url 'oportunidad_list' %}" class="sidebar-link {% if 'oportunidad' in request.resolver_match.url_name %}active{% endif %}">
                    <i class="bi bi-graph-up-arrow"></i> Oportunidades
                </a>
                <a href="{% url 'empresa_list' %}" class="sidebar-link {% if 'empresa' in request.resolver_match.url_name %}active{% endif %}">
                    <i class="bi bi-building"></i> Empresas
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-user">{{ user.get_full_name|default:user.username }}</div>
                <a href="{% url 'logout' %}" class="sidebar-logout">
                    <i class="bi bi-box-arrow-right"></i> Cerrar sesion
                </a>
            </div>
        </aside>

        <div class="flex-grow-1" id="main-content">
            <nav class="topbar">
                <button class="btn btn-sm btn-outline-secondary d-md-none" id="menu-toggle">
                    <i class="bi bi-list"></i>
                </button>
                <div></div>
                <div class="topbar-user">
                    <span class="topbar-dot"></span>
                    {{ user.username }}
                </div>
            </nav>

            <div class="container-fluid p-4">
                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
                {% endif %}

                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('menu-toggle')?.addEventListener('click', function() {
            document.querySelector('.sidebar').classList.toggle('show');
        });
    </script>
</body>
</html>
