<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CRM{% endblock %} | CRM Django</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div class="sidebar bg-dark text-white" id="sidebar">
            <div class="sidebar-header p-3 border-bottom border-secondary">
                <h5 class="mb-0"><i class="bi bi-people-fill"></i> CRM Django</h5>
            </div>
            <nav class="p-3">
                <ul class="nav flex-column gap-1">
                    <li class="nav-item">
                        <a href="{% url 'dashboard' %}" class="nav-link text-white {% if request.resolver_match.url_name == 'dashboard' %}active bg-primary rounded{% endif %}">
                            <i class="bi bi-speedometer2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'contacto_list' %}" class="nav-link text-white {% if 'contacto' in request.resolver_match.url_name %}active bg-primary rounded{% endif %}">
                            <i class="bi bi-person"></i> Contactos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'oportunidad_list' %}" class="nav-link text-white {% if 'oportunidad' in request.resolver_match.url_name %}active bg-primary rounded{% endif %}">
                            <i class="bi bi-graph-up"></i> Oportunidades
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'empresa_list' %}" class="nav-link text-white {% if 'empresa' in request.resolver_match.url_name %}active bg-primary rounded{% endif %}">
                            <i class="bi bi-building"></i> Empresas
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="mt-auto p-3 border-top border-secondary position-absolute bottom-0 w-100">
                <span class="small text-secondary">{{ user.username }}</span>
                <a href="{% url 'logout' %}" class="nav-link text-danger small p-0 mt-1">
                    <i class="bi bi-box-arrow-right"></i> Cerrar sesion
                </a>
            </div>
        </div>

        <div class="flex-grow-1" id="main-content">
            <nav class="navbar navbar-light bg-white border-bottom px-3">
                <button class="btn btn-sm btn-outline-secondary d-md-none" id="menu-toggle">
                    <i class="bi bi-list"></i>
                </button>
                <div></div>
                <div>
                    <span class="text-muted me-3"><i class="bi bi-person-circle"></i> {{ user.get_full_name|default:user.username }}</span>
                </div>
            </nav>

            <div class="container-fluid p-4">
                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
                {% endif %}

                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('menu-toggle')?.addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('show');
        });
    </script>
</body>
</html>
