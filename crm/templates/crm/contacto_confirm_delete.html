{% extends "crm/base.html" %}

{% block title %}Eliminar Contacto{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card card-craft">
            <div class="card-body p-5 text-center">
                <div class="mb-3" style="width:48px;height:48px;background:var(--danger-soft);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:var(--danger);font-size:1.25rem;">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                </div>
                <h4 style="font-size:1.1rem;">Confirmar Eliminacion</h4>
                <p class="text-muted mb-1">Estas seguro de eliminar el contacto <strong>{{ contacto.nombre }}</strong>?</p>
                <p class="text-danger mb-4" style="font-size:0.8rem;">Esta accion no se puede deshacer.</p>
                <form method="post" class="d-flex justify-content-center gap-2">
                    {% csrf_token %}
                    <a href="{% url 'contacto_detail' contacto.pk %}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Eliminar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
