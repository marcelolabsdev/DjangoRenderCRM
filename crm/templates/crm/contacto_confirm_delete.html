{% extends "crm/base.html" %}

{% block title %}Eliminar Contacto{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4 text-center">
                <i class="bi bi-exclamation-triangle text-warning" style="font-size: 3rem;"></i>
                <h4 class="mt-3">Confirmar Eliminacion</h4>
                <p class="text-muted">Estas seguro de eliminar el contacto <strong>{{ contacto.nombre }}</strong>?</p>
                <p class="text-danger small">Esta accion no se puede deshacer.</p>
                <form method="post" class="d-flex justify-content-center gap-2">
                    {% csrf_token %}
                    <a href="{% url 'contacto_detail' contacto.pk %}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Eliminar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
