{% extends "crm/base.html" %}

{% block title %}Eliminar Contacto{% endblock %}

{% block content %}
<div style="max-width:480px;margin:0 auto;">
    <div class="card-craft" style="padding:var(--space-8);text-align:center;">
        <div style="width:48px;height:48px;background:var(--danger-soft);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:var(--danger);font-size:1.25rem;margin-bottom:var(--space-4);">
            <i class="bi bi-exclamation-triangle-fill"></i>
        </div>
        <h4 style="font-size:1.1rem;margin-bottom:var(--space-2);">Confirmar Eliminacion</h4>
        <p style="color:var(--ink-secondary);font-size:0.875rem;margin-bottom:var(--space-1);">
            Estas seguro de eliminar el contacto <strong>{{ contacto.nombre }}</strong>?
        </p>
        <p style="color:var(--danger);font-size:0.8rem;margin-bottom:var(--space-5);">Esta accion no se puede deshacer.</p>
        <form method="post" style="display:flex;justify-content:center;gap:var(--space-2);">
            {% csrf_token %}
            <a href="{% url 'contacto_detail' contacto.pk %}" class="btn-craft btn-craft-outline">Cancelar</a>
            <button type="submit" class="btn-craft btn-craft-danger">
                <i class="bi bi-trash"></i> Eliminar
            </button>
        </form>
    </div>
</div>
{% endblock %}
