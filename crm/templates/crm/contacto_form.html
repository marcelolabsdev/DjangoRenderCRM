{% extends "crm/base.html" %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div style="max-width:640px;margin:0 auto;">
    <div class="card-craft" style="padding:var(--space-6);">
        <h3 style="font-size:1.1rem;font-weight:600;margin-bottom:var(--space-5);">{{ titulo }}</h3>
        <form method="post" class="form-craft">
            {% csrf_token %}
            {% for field in form %}
            <div style="margin-bottom:var(--space-4);">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <div style="font-size:0.75rem;color:var(--danger);margin-top:var(--space-1);">
                    {% for error in field.errors %}{{ error }}{% endfor %}
                </div>
                {% endif %}
            </div>
            {% endfor %}
            <div style="display:flex;gap:var(--space-2);margin-top:var(--space-5);">
                <button type="submit" class="btn-craft btn-craft-primary">
                    <i class="bi bi-check-lg"></i> Guardar
                </button>
                <a href="javascript:history.back()" class="btn-craft btn-craft-outline">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
