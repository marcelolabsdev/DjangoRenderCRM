<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion | CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body style="background:var(--surface-canvas);display:flex;align-items:center;justify-content:center;min-height:100vh;">
    <div style="width:100%;max-width:360px;padding:var(--space-6);">
        <div style="text-align:center;margin-bottom:var(--space-8);">
            <div style="width:48px;height:48px;background:var(--brand);border-radius:var(--radius-lg);display:inline-flex;align-items:center;justify-content:center;color:white;font-size:1.25rem;margin-bottom:var(--space-4);">
                <i class="bi bi-bar-chart-fill"></i>
            </div>
            <h2 style="font-size:1.25rem;font-weight:700;color:var(--ink);margin:0 0 var(--space-1);">CRM</h2>
            <p style="font-size:0.85rem;color:var(--ink-tertiary);margin:0;">Ingresa tus credenciales</p>
        </div>

        <div class="card-craft" style="padding:var(--space-6);">
            <form method="post">
                {% csrf_token %}
                {% if form.errors %}
                <div style="padding:var(--space-3);border-radius:var(--radius-md);margin-bottom:var(--space-4);font-size:0.8rem;border:1px solid var(--danger);background:var(--danger-soft);color:var(--danger);">
                    Usuario o contrasena incorrectos.
                </div>
                {% endif %}
                <div style="margin-bottom:var(--space-4);">
                    <label for="id_username" style="font-size:0.8rem;font-weight:500;color:var(--ink-secondary);display:block;margin-bottom:var(--space-1);">Usuario</label>
                    <input type="text" name="username" id="id_username" autofocus style="width:100%;padding:var(--space-2) var(--space-3);border:1px solid var(--border-emphasis);border-radius:var(--radius-md);font-size:0.875rem;background:var(--surface-sunken);color:var(--ink);font-family:var(--font-sans);">
                </div>
                <div style="margin-bottom:var(--space-5);">
                    <label for="id_password" style="font-size:0.8rem;font-weight:500;color:var(--ink-secondary);display:block;margin-bottom:var(--space-1);">Contrasena</label>
                    <input type="password" name="password" id="id_password" style="width:100%;padding:var(--space-2) var(--space-3);border:1px solid var(--border-emphasis);border-radius:var(--radius-md);font-size:0.875rem;background:var(--surface-sunken);color:var(--ink);font-family:var(--font-sans);">
                </div>
                <button type="submit" class="btn-craft btn-craft-primary" style="width:100%;justify-content:center;">
                    Iniciar Sesion
                </button>
            </form>
        </div>
    </div>
</body>
</html>
